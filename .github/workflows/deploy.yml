name: Deploy Hexo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-blog
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Generate site
        run: |
          npx hexo clean
          npx hexo generate

      - name: Deploy to GitHub Pages
        env:
          DEPLOY_KEY: ${{ secrets.HEXO_DEPLOY_TOKEN }}
        run: |
          cd public
          git init
          git config user.name "shiro10032"
          git config user.email "2391760938@qq.com"
          git add -A
          git commit -m "deploy: $(date '+%Y-%m-%d %H:%M:%S')"
          git push -f "https://shiro10032:$DEPLOY_KEY@github.com/shiro10032/shiro10032.github.io.git" main
