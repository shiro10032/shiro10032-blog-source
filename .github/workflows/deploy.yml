name: Deploy Hexo

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx hexo clean
      - run: npx hexo generate
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: public
